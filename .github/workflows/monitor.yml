name: GBP Exchange Rate Monitor

on:
  schedule:
    - cron: "*/10 * * * 1-5"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies (Chinese fonts)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-wqy-zenhei
          rm -rf ~/.cache/matplotlib

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor script
        env:
          THRESHOLD_PRICE: ${{ secrets.THRESHOLD_PRICE }}
          BARK_DEVICE_KEY: ${{ secrets.BARK_DEVICE_KEY }}
          PUSHDEER_KEY: ${{ secrets.PUSHDEER_KEY }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WXPUSHER_TOKEN: ${{ secrets.WXPUSHER_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}
        run: |
          python monitor.py

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git status
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: GBP rate $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"
            git push
          fi
